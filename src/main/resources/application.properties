# =============================================================================
# Configuración SSL (apta para certificaciones CA) - 12 factor: config en entorno
# =============================================================================
# En EC2/producción defina las variables de entorno y NUNCA ponga contraseñas aquí.
# Ejemplo en EC2:
#   KEY_STORE_PATH=file:/opt/app/keystore/ecikeystore.p12
#   KEY_STORE_PASSWORD=<desde AWS Secrets Manager o variable de entorno segura>
#   KEY_ALIAS=ecikeypair
# =============================================================================

# Tras proxy HTTPS (Apache): Spring usa X-Forwarded-Proto / Host correctamente.
server.forward-headers-strategy=framework

# En EC2/producción: SSL_ENABLED=true. Local sin keystore: omitir o SSL_ENABLED=false.
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store-type=PKCS12
server.ssl.key-store=${KEY_STORE_PATH:classpath:keystore/ecikeystore.p12}
server.ssl.key-store-password=${KEY_STORE_PASSWORD:}
server.ssl.key-alias=${KEY_ALIAS:ecikeypair}

# Puerto: usar variable PORT (12-factor). Por defecto 5000.
# server.port se fija en SecurewebApplication.getPort()
