<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Login - Secure Web</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 320px; margin: 2rem auto; padding: 1rem; }
        h1 { font-size: 1.25rem; }
        input { display: block; width: 100%; margin: 0.5rem 0; padding: 0.5rem; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; margin-top: 0.5rem; cursor: pointer; }
        .error { color: #c00; font-size: 0.9rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
<h1>Iniciar sesión</h1>
<form th:action="@{/login}" method="post">
    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="username">Usuario</label>
    <input type="text" id="username" name="username" required autofocus/>
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required/>
    <button type="submit">Entrar</button>
</form>
<p class="error" th:if="${param.error}">Usuario o contraseña incorrectos.</p>
<p th:if="${param.logout}">Sesión cerrada correctamente.</p>
</body>
</html>
