services:
  spring:
    build: .
    image: secureweb-spring:latest
    container_name: secureweb-spring
    environment:
      PORT: "5000"
      SSL_ENABLED: "false"
    expose:
      - "5000"
    networks:
      - secure-net

  apache:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    image: secureweb-apache:latest
    container_name: secureweb-apache
    ports:
      - "8080:80"
    depends_on:
      - spring
    networks:
      - secure-net

networks:
  secure-net:
    driver: bridge
