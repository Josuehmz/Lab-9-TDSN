<VirtualHost *:80>
    DocumentRoot /usr/local/apache2/htdocs

    <Directory "/usr/local/apache2/htdocs">
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://spring:5000/api/
    ProxyPassReverse /api/ http://spring:5000/api/
</VirtualHost>
